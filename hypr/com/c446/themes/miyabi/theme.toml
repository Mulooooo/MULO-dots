# THEME: miyabi — Terafox (teal) port from the i3 miyabi config
name        = "miyabi"

# GTK / icons / cursor
gtk_theme   = "Nightfox-Dark-Terafox"
icon_theme  = "Yaru-prussiangreen"
cursor      = "Miyabi-Cursors"
cursor_size = "24"
font        = "MesloLGL Nerd Font Mono 15"

# VS Code: EdenEast.nightfox bundles the Terafox theme
vscode_ext   = "EdenEast.nightfox"
vscode_theme = "Terafox"

# Wallpapers — deployed to ~/Pictures/{Backgrounds,fastfetch_assets}
wallpaper_default = "miyabi_bg_1.jpeg"
fastfetch_image   = "fastfetch_assets/miyabi_bg_1.jpeg"
