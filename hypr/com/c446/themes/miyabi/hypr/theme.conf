# -----------------------------------------------------
# THEME: miyabi — Hyprland cursor + border colors (Terafox teal)
# Sourced early from commons hyprland.conf (after env.conf)
# -----------------------------------------------------

# --- Cursor (palette-specific) ---
# Miyabi-Cursors is an Xcursor theme (no hyprcursor variant); Hyprland falls
# back to xcursor. apply-theme.sh also runs `hyprctl setcursor` to apply live.
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Miyabi-Cursors
env = XCURSOR_THEME,Miyabi-Cursors
env = XCURSOR_SIZE,24

# --- Border colors ---
# Focused: #4D9C9F (teal, from i3 client.focused) | Unfocused: #152128
general {
    col.active_border = rgba(4D9C9Fee)
    col.inactive_border = rgba(152128aa)
}
