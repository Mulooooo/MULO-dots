# -----------------------------------------------------
# THEME: vivian — Hyprland cursor + border colors
# Sourced early from commons hyprland.conf (after env.conf)
# -----------------------------------------------------

# --- Cursor (palette-specific) ---
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Vivian-Cursors
env = XCURSOR_THEME,Vivian-Cursors
env = XCURSOR_SIZE,24

# --- Border colors ---
# Focused: #C0AAFF | Unfocused: #403E5C
general {
    col.active_border = rgba(C0AAFFee)
    col.inactive_border = rgba(403E5Caa)
}
