# -----------------------------------------------------
# HYPRLAND CONFIG - MAIN (commons, palette-independent)
# -----------------------------------------------------

# 1. Load Environment Variables First (Critical for Nvidia/Themes)
source = ~/.config/hypr/env.conf

# 1b. Active theme: cursor env + border colors (provided by themes/<name>)
source = ~/.config/hypr/theme.conf

# 2. Component Sources
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/appearance.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/autostart.conf

# 3. Layout Engines
   
master {
    new_status = master
    mfact = 0.5
}

misc {
    force_default_wallpaper = 0 # Set to 0 to disable anime girl/default splash
    disable_hyprland_logo = true
   # vfr = true # Variable Frame Rate - Essential for laptop battery life
    vrr = 1    # Variable Refresh Rate - Great for your 4070 gaming
}

# Fixes for Nvidia & High-DPI
xwayland {
    force_zero_scaling = true
}

cursor {
    no_hardware_cursors = true
    # allow_physically_prohibit = false # Only if you notice "ghost" clicks
}
