# === VARIABLES ===
$mainMod = SUPER

$1 = code:10
$2 = code:11
$3 = code:12
$4 = code:13
$5 = code:14
$6 = code:15
$7 = code:16 
$8 = code:17 
$9 = code:18 
$0 = code:19

# === WORKSPACE BINDINGS (keycode, layout-agnostic) ===
bind = $mainMod,       $1, workspace, 1
bind = $mainMod,       $2, workspace, 2
bind = $mainMod,       $3, workspace, 3
bind = $mainMod,       $4, workspace, 4
bind = $mainMod,       $5, workspace, 5
bind = $mainMod,       $6, workspace, 6
bind = $mainMod,       $7, workspace, 7
bind = $mainMod,       $8, workspace, 8
bind = $mainMod,       $9, workspace, 9
#bind = $mainMod,       $0, workspace, 9
#bind = $mainMod ,       $0, focusmonitor, HDMI-A-1
bind = $mainMod CONTROL, $1, workspace, 10
bind = $mainMod CONTROL, $1, focusmonitor, HDMI-A-1
bind = $mainMod CONTROL, $2, workspace, 11
bind = $mainMod CONTROL, $3, workspace, 12
bind = $mainMod CONTROL, $4, workspace, 13
bind = $mainMod CONTROL, $5, workspace, 14
bind = $mainMod CONTROL, $6, workspace, 15
bind = $mainMod CONTROL, $7, workspace, 16
bind = $mainMod CONTROL, $8, workspace, 17
bind = $mainMod CONTROL, $9, workspace, 18
bind = $mainMod CONTROL, $0, workspace, 19

bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1


# Move window to workspace
bind = $mainMod SHIFT, $1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, $2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, $3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, $4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, $5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, $6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, $7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, $8, movetoworkspacesilent, 8
#bind = $mainMod SHIFT, $9, movetoworkspacesilent, 9
#bind = $mainMod SHIFT, $0, movetoworkspacesilent, 9
bind = $mainMod SHIFT CONTROL, $1, movetoworkspacesilent, 10
bind = $mainMod SHIFT CONTROL, $2, movetoworkspacesilent, 11
bind = $mainMod SHIFT CONTROL, $3, movetoworkspacesilent, 12
bind = $mainMod SHIFT CONTROL, $4, movetoworkspacesilent, 13
bind = $mainMod SHIFT CONTROL, $5, movetoworkspacesilent, 14
bind = $mainMod SHIFT CONTROL, $6, movetoworkspacesilent, 15
bind = $mainMod SHIFT CONTROL, $7, movetoworkspacesilent, 16
bind = $mainMod SHIFT CONTROL, $8, movetoworkspacesilent, 17
bind = $mainMod SHIFT CONTROL, $9, movetoworkspacesilent, 18
bind = $mainMod SHIFT CONTROL, $0, movetoworkspacesilent, 19

bind = $mainMod SHIFT, E,  exit



# === APPLICATIONS & ACTIONS ===
bind = $mainMod,       Return,      exec, kitty
bind = $mainMod,       E,           exec, kitty yazi
bind = $mainMod,       S,           exec, rofi -show drun
bind = $mainMod,       A,           exec, rofi -show window
bind = $mainMod,       semicolon, exec, rofi -show emoji
bind = $mainMod,       Z,           exec, rofi -modi emoji -show emoji -emoji-text | wl-copy
bind = $mainMod,       F,           fullscreen, 0
bind = $mainMod SHIFT, T,           exec, ~/.config/hypr/scripts/hypr_mono.sh
# Corrected syntax: Modifiers go together in the first block
# Use the 's' flag and the exact keysyms from your wev output
#binds = Super_L&Shift_L, G, exec, ~/.config/hypr/scripts/focus.sh
# Use lowercase 'g' even with SHIFT
bind = $mainMod SHIFT, g, exec, ~/.config/hypr/scripts/transparency.sh
bind = $mainMod,       G, exec, ~/.config/hypr/scripts/gamemode.sh
bind = $mainMod,       C, exec, ~/.config/hypr/scripts/toggle-cursor.sh
bind = $mainMod,       Q,           killactive
bind = $mainMod SHIFT, Space,       togglefloating

# === NAVIGATION (MAIN) ===
bind = $mainMod,       Left,  movefocus, l
bind = $mainMod,       Right, movefocus, r
bind = $mainMod,       Up,    movefocus, u
bind = $mainMod,       Down,  movefocus, d

bind = $mainMod SHIFT, Left,  movewindow, l
bind = $mainMod SHIFT, Right, movewindow, r
bind = $mainMod SHIFT, Up,    movewindow, u
bind = $mainMod SHIFT, Down,  movewindow, d

# === MASTER LAYOUT CONTROLS ===
bind = $mainMod, Space, layoutmsg, swapwithmaster
bind = $mainMod, H,     layoutmsg, togglesplit
bind = $mainMod , D, layoutmsg, addmaster
bind = $mainMod SHIFT, D, layoutmsg, removemaster

# === SUBMAP: ARRANGE MODE ===
bind = $mainMod, R, submap, arrange
submap = arrange

bind  = ,        Left,  movefocus,    l
bind  = ,        Right, movefocus,    r
bind  = ,        Up,    movefocus,    u
bind  = ,        Down,  movefocus,    d
bind  = SHIFT,   Left,  movewindow,   l
bind  = SHIFT,   Right, movewindow,   r
bind  = SHIFT,   Up,    movewindow,   u
bind  = SHIFT,   Down,  movewindow,   d
binde = CONTROL, Left,  resizeactive, -40 0
binde = CONTROL, Right, resizeactive,  40 0
binde = CONTROL, Up,    resizeactive,  0 -40
binde = CONTROL, Down,  resizeactive,  0  40
bind  = ,        space, layoutmsg,    swapwithmaster
bind  = ,        A,     layoutmsg,    addmaster
bind  = ,        D,     layoutmsg,    removemaster
bind  = ,        escape, submap,      reset
bind  = ,        return, submap,      reset
submap = reset

# === SUBMAP: WALLPAPER ===
bind = $mainMod, W, submap, wallpaper
submap = wallpaper

binde = , $1, exec, ~/.config/hypr/scripts/set_wallpaper.sh 1
binde = , $2, exec, ~/.config/hypr/scripts/set_wallpaper.sh 2
binde = , $3, exec, ~/.config/hypr/scripts/set_wallpaper.sh 9
binde = , $4, exec, ~/.config/hypr/scripts/set_wallpaper.sh 6
binde = , $5, exec, ~/.config/hypr/scripts/set_wallpaper.sh 8
binde = , $6, exec, ~/.config/hypr/scripts/set_wallpaper.sh 7
binde = , $7, exec, ~/.config/hypr/scripts/set_wallpaper.sh 5
binde = , $8, exec, ~/.config/hypr/scripts/set_wallpaper.sh 4
binde = , $9, exec, ~/.config/hypr/scripts/set_wallpaper.sh 3

bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# === SYSTEM & MEDIA ===
bind   = $mainMod SHIFT, X,                  exec,    hyprlock
bindle = ,         XF86AudioRaiseVolume,  exec,    pactl set-sink-volume @DEFAULT_SINK@ +5% && ~/.config/i3/notify-volume.sh
bindle = ,         XF86AudioLowerVolume,  exec,    pactl set-sink-volume @DEFAULT_SINK@ -5% && ~/.config/hypr/scripts/notify-volume.sh
bindl  = ,         XF86AudioMute,         exec,    pactl set-sink-mute @DEFAULT_SINK@ toggle && ~/.config/hypr/scripts/notify-volume.sh
bindle = ,         XF86MonBrightnessUp,   exec,    brightnessctl set +5% && ~/.config/hypr/scripts/notify-brightness.sh
bindle = ,         XF86MonBrightnessDown, exec,    brightnessctl set 5%- && ~/.config/hypr/scripts/notify-brightness.sh

# === MOUSE BINDINGS ===
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# === SCREENSHOTS ===
bind = $mainMod SHIFT, S,     exec, grimblast copy area
bind = ,               Print, exec, c
bind = $mainMod,       Home, exec, grimblast copy active

# === PRESENTER MODE ===
# $mainMod + 9 : switch eDP-1 to WS9 (mirror view) and hand focus to projector
bind = $mainMod, $9, workspace,    9
bind = $mainMod, $9, focusmonitor, HDMI-A-1

# Projector controls:
#   SUPER+P        : force HDMI-A-1 on (preferred mode + safe fallbacks)
#   SUPER+SHIFT+P  : cycle through the modes the projector advertises (tap until image appears)
bind = $mainMod,       P, exec, ~/.config/hypr/scripts/start-hdmi.sh
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/cycle-hdmi-mode.sh

# === Spotify Vim Controls (requires playerctl) ===

# h (Left) = Previous Track
bind = $mainMod, h, exec, playerctl -p spotify previous

# j (Down) = Decrease Volume (binde allows holding the key to repeat)
binde = $mainMod, j, exec, playerctl -p spotify volume 0.1-

# k (Up) = Increase Volume (binde allows holding the key to repeat)
binde = $mainMod, k, exec, playerctl -p spotify volume 0.1+

bind = $mainMod SHIFT, v, exec, ~/.config/hypr/scripts/round-robin-paste.sh

# l (Right) = Next Track
bind = $mainMod, l, exec, playerctl -p spotify next
