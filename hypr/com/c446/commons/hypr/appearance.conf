# -----------------------------------------------------
# HYPRLAND - APPEARANCE (i3-Style Port, commons / palette-independent)
# Border colors live in the active theme's theme.conf
# -----------------------------------------------------

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2

    # col.active_border / col.inactive_border are set in ~/.config/hypr/theme.conf

    layout = master # Matches your preference for Master-stacking
}

decoration {
    rounding = 0 # Sharp corners per i3 spec

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true 
        noise = 0.05 # Subtle noise hides banding on high-refresh screens
        brightness = 1 # Darkens the blur slightly for the 'Vivian' look
    }

    shadow {
        enabled = false 
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    
    # Faster, snappy transitions
    animation = windows, 1, 5, myBezier, popin 80%
    animation = windowsOut, 1, 5, myBezier, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    # Slide 0% makes it "teleport" like i3 if you prefer zero travel
    animation = workspaces, 1, 4, default, slide 0%
}

render {
    # Set to 2 (if available in your Hyprland version) for 'Automatic'
    direct_scanout = 2
}
