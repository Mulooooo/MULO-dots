monitor = eDP-1, 2560x1600@240, 0x0, 1.33
monitor = HDMI-A-1, preferred, auto, 1
monitor = desc:Samsung Electric Company SAMSUNG, 1920x1080@59.94, 1920x0, 1

# 1. Bind Workspace 10 to the HDMI monitor
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:HDMI-A-1, persistent:true

windowrule {
    name = ws10-persistent-mirror
    match:initial_class = ^(at\.yrlf\.wl_mirror)$
    monitor = eDP-1
    workspace = 9 silent
    float = on
    size = 100% 100%
    fullscreen = on
    fullscreen_state = 2 2
    no_focus = on
    no_anim = on
    no_blur = on
    border_size = 0
    opaque = on
}

windowrule {
    name = ws9-exile
    match:workspace = 9
    match:initial_class = negative:^(at\.yrlf\.wl_mirror)$   # docs: prefix with negative: to negate

    workspace = 8 silent
}