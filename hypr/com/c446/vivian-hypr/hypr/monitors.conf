# internal laptop display (AU Optronics)
monitor = eDP-1, 2560x1600@240, 0x0, 1.33

# External display (HDMI-A-1) — currently an Epson projector
# Positioned to the LEFT of the laptop (-1924x0 sits just left of the scaled eDP-1).
# IMPORTANT: use "preferred" (not a hardcoded 1920x1080@144) — projectors rarely
# expose 144Hz, and a hardcoded unsupported mode makes Hyprland leave the output
# DARK (likely why i3 rendered but Hyprland didn't). "preferred" auto-picks a mode
# the projector actually advertises. Force it on with SUPER+P (start-hdmi.sh), or
# cycle modes live with SUPER+SHIFT+P (cycle-hdmi-mode.sh) if the auto-pick is wrong.
monitor = HDMI-A-1, preferred, -1924x0, 1

# Fallback for any other sink that gets plugged in later.
monitor = , preferred, auto, 1

# 1. Bind Workspace 10 to the HDMI monitor
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1
workspace = 11, monitor:HDMI-A-1
workspace = 12, monitor:HDMI-A-1
workspace = 13, monitor:HDMI-A-1
workspace = 14, monitor:HDMI-A-1
workspace = 15, monitor:HDMI-A-1
workspace = 16, monitor:HDMI-A-1
workspace = 17, monitor:HDMI-A-1
workspace = 19, monitor:HDMI-A-1
workspace = 20, monitor:HDMI-A-1


windowrule {
    name = ws10-persistent-mirror
    match:initial_class = ^(at\.yrlf\.wl_mirror)$
    monitor = eDP-1
    workspace = 10 silent
    float = on
    size = 100% 100%
    fullscreen = on
    fullscreen_state = 2 2
    no_focus = on
    no_anim = on
    no_blur = on
    border_size = 0
    opaque = on
}
