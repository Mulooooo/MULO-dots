# === VARIABLES ===
$mainMod = SUPER

$1 = code:10
$2 = code:11
$3 = code:12
$4 = code:13
$5 = code:14
$6 = code:15
$7 = code:16
$8 = code:17
$9 = code:18
$0 = code:19

# === WORKSPACE BINDINGS (keycode, layout-agnostic) ===
bind = $mainMod,       $1, workspace, 1
bind = $mainMod,       $2, workspace, 2
bind = $mainMod,       $3, workspace, 3
bind = $mainMod,       $4, workspace, 4
bind = $mainMod,       $5, workspace, 5
bind = $mainMod,       $6, workspace, 6
bind = $mainMod,       $7, workspace, 7
bind = $mainMod,       $8, workspace, 8
bind = $mainMod,       $9, workspace, 9
bind = $mainMod,       $0, workspace, 9
bind = $mainMod ,       $0, focusmonitor, HDMI-A-1
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1


# Move window to workspace
bind = $mainMod SHIFT, $1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, $2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, $3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, $4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, $5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, $6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, $7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, $8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, $9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, $0, movetoworkspacesilent, 9
bind = $mainMod SHIFT, E,  exit

# === APPLICATIONS & ACTIONS ===
bind = $mainMod,       Return,      exec, kitty
bind = $mainMod,       E,           exec, thunar
bind = $mainMod,       S,           exec, rofi -show drun
bind = $mainMod,       F,           fullscreen, 0
bind = $mainMod SHIFT, T,           exec, ~/.config/hypr/scripts/hypr_mono.sh
# Corrected syntax: Modifiers go together in the first block
# Use the 's' flag and the exact keysyms from your wev output
#binds = Super_L&Shift_L, G, exec, ~/.config/hypr/scripts/focus.sh
# Use lowercase 'g' even with SHIFT
bind = $mainMod SHIFT, g, exec, ~/.config/hypr/scripts/focus.sh
bind = $mainMod,       G, exec, ~/.config/hypr/scripts/gamemode.sh
bind = $mainMod,       Q,           killactive
bind = $mainMod SHIFT, Space,       togglefloating

# === NAVIGATION (MAIN) ===
bind = $mainMod,       Left,  movefocus, l
bind = $mainMod,       Right, movefocus, r
bind = $mainMod,       Up,    movefocus, u
bind = $mainMod,       Down,  movefocus, d

bind = $mainMod SHIFT, Left,  movewindow, l
bind = $mainMod SHIFT, Right, movewindow, r
bind = $mainMod SHIFT, Up,    movewindow, u
bind = $mainMod SHIFT, Down,  movewindow, d

# === MASTER LAYOUT CONTROLS ===
bind = $mainMod, Space, layoutmsg, swapwithmaster
bind = $mainMod, H,     layoutmsg, togglesplit
bind = $mainMod, A,     layoutmsg, addmaster
bind = $mainMod, D,     layoutmsg, removemaster

# === SUBMAP: ARRANGE MODE ===
bind = $mainMod, R, submap, arrange
submap = arrange

bind  = ,        Left,  movefocus,    l
bind  = ,        Right, movefocus,    r
bind  = ,        Up,    movefocus,    u
bind  = ,        Down,  movefocus,    d
bind  = SHIFT,   Left,  movewindow,   l
bind  = SHIFT,   Right, movewindow,   r
bind  = SHIFT,   Up,    movewindow,   u
bind  = SHIFT,   Down,  movewindow,   d
binde = CONTROL, Left,  resizeactive, -40 0
binde = CONTROL, Right, resizeactive,  40 0
binde = CONTROL, Up,    resizeactive,  0 -40
binde = CONTROL, Down,  resizeactive,  0  40
bind  = ,        space, layoutmsg,    swapwithmaster
bind  = ,        A,     layoutmsg,    addmaster
bind  = ,        D,     layoutmsg,    removemaster
bind  = ,        escape, submap,      reset
bind  = ,        return, submap,      reset
submap = reset

# === SUBMAP: WALLPAPER ===
bind = $mainMod, W, submap, wallpaper
submap = wallpaper

binde = , $1, exec, ~/.config/hypr/scripts/set_wallpaper.sh 1
binde = , $2, exec, ~/.config/hypr/scripts/set_wallpaper.sh 2
binde = , $3, exec, ~/.config/hypr/scripts/set_wallpaper.sh 3
binde = , $4, exec, ~/.config/hypr/scripts/set_wallpaper.sh 4
binde = , $5, exec, ~/.config/hypr/scripts/set_wallpaper.sh 5
binde = , $6, exec, ~/.config/hypr/scripts/set_wallpaper.sh 6

bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# === SYSTEM & MEDIA ===
bind   = $mainMod, Lock,                  exec,    i3lock-fancy
bindle = ,         XF86AudioRaiseVolume,  exec,    pactl set-sink-volume @DEFAULT_SINK@ +5% && ~/.config/i3/notify-volume.sh
bindle = ,         XF86AudioLowerVolume,  exec,    pactl set-sink-volume @DEFAULT_SINK@ -5% && ~/.config/hypr/scripts/notify-volume.sh
bindl  = ,         XF86AudioMute,         exec,    pactl set-sink-mute @DEFAULT_SINK@ toggle && ~/.config/hypr/scripts/notify-volume.sh
bindle = ,         XF86MonBrightnessUp,   exec,    brightnessctl set +5% && ~/.config/hypr/scripts/notify-brightness.sh
bindle = ,         XF86MonBrightnessDown, exec,    brightnessctl set 5%- && ~/.config/hypr/scripts/notify-brightness.sh

# === MOUSE BINDINGS ===
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# === SCREENSHOTS ===
bind = $mainMod SHIFT, S,     exec, grimblast copy area
bind = ,               Print, exec, grimblast copy screen
bind = $mainMod,       Print, exec, grimblast copy active

# === PRESENTER MODE ===
# $mainMod + 9 : switch eDP-1 to WS9 (mirror view) and hand focus to projector
bind = $mainMod, $9, workspace,    9
bind = $mainMod, $9, focusmonitor, HDMI-A-1
