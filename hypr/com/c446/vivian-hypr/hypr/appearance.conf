# -----------------------------------------------------
# VIVIAN HYPRLAND - APPEARANCE (i3-Style Port)
# -----------------------------------------------------

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    
    # Focused: #C0AAFF | Unfocused: #403E5C
    col.active_border = rgba(C0AAFFee)
    col.inactive_border = rgba(403E5Caa)

    layout = master # Matches your preference for Master-stacking
}

decoration {
    rounding = 0 # Sharp corners per i3 spec

    # Opacity levels (Matches your Kitty config)
    active_opacity = 0.90
    inactive_opacity = 0.80

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        ignore_opacity = true 
        noise = 0.01 # Subtle noise hides banding on high-refresh screens
        brightness = 0.9 # Darkens the blur slightly for the 'Vivian' look
    }

    shadow {
        enabled = false 
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    
    # Faster, snappy transitions
    animation = windows, 1, 5, myBezier, popin 80%
    animation = windowsOut, 1, 5, myBezier, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    # Slide 0% makes it "teleport" like i3 if you prefer zero travel
    animation = workspaces, 1, 4, default, slide
}

render {
    # Direct scanout reduces latency in games on your 4070
    # Set to 2 (if available in your Hyprland version) for 'Automatic'
    direct_scanout = 1
}