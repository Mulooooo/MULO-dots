# --- Cursor & Theme ---
# Modern Hyprland uses hyprcursor; legacy/GTK uses xcursor
env = HYPRCURSOR_THEME,Vivian-Cursors
env = HYPRCURSOR_SIZE,48
env = XCURSOR_THEME,Vivian-Cursors
env = XCURSOR_SIZE,48

# --- Session Control ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- Nvidia & Multi-GPU (Intel iGPU + RTX 4070) ---
# Keeping your card order: Intel (card2) for display, Nvidia (card1) for render
env = AQ_DRM_DEVICES,/dev/dri/card2:/dev/dri/card1
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct



# Toolkit scaling/backends
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1