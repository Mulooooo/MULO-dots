# hyprlock.conf — minimal / squared / blurred
# Palette: oklch purple-indigo — hex values computed via oklch→oklab→sRGB
# ─────────────────────────────────────────────────────────────────────────
#
#  Token          oklch source             HEX
#  --bg-4         oklch(24% 0.045 275)    #191D34
#  --bg-3         oklch(28% 0.055 282)    #252543
#  --bg-2         oklch(32% 0.065 288)    #312D52
#  --bg-1         oklch(36% 0.075 292)    #3E3561
#  --accent-2     oklch(80% 0.15  290)    #BDACFF
#  --text-1       oklch(95% 0     0  )    #EEEEEE
#  --text-3       oklch(83% 0     0  )    #C7C7C7
#  --text-4       oklch(58% 0     0  )    #7A7A7A
#  --green-1      (hiberbee)              #A9DC76
#  --red-1        (hiberbee)              #FF6188
#  --yellow-1     (hiberbee)              #FFD866

general {
    hide_cursor        = true
    ignore_empty_input = false
    text_trim          = true
    fractional_scaling = 2
    fail_timeout       = 2000
}

auth {
    pam:enabled = true
    pam:module  = hyprlock
}

animations {
    enabled = true
    bezier  = snappy, 0.1, 0.85, 0.15, 1.0
    animation = fade,             1, 1.8, snappy
    animation = fadeOut,          1, 1.5, snappy
    animation = inputFieldColors, 1, 2.5, snappy
    animation = inputFieldFade,   1, 2.0, snappy
    animation = inputFieldDots,   1, 1.0, snappy
}

# ─── Background ── blurred screenshot ─────────────────────────────────────

background {
    monitor     =
    path        = screenshot
    color       = rgba(25, 29, 52, 1)          # --bg-4 fallback

    blur_passes       = 4
    blur_size         = 6
    noise             = 0.008
    contrast          = 0.88
    brightness        = 0.72
    vibrancy          = 0.12
    vibrancy_darkness = 0.04
}

# ─── Full-screen tint overlay ──────────────────────────────────────────────
# rgba(25, 29, 52, 0.52) → --bg-4 at 52% opacity

shape {
    monitor  =
    size     = 10000, 10000
    color    = rgba(25, 29, 52, 0.52)
    rounding = 0
    halign   = center
    valign   = center
    position = 0, 0
    zindex   = 0
}

# ─── Top-left: user · host ─────────────────────────────────────────────────

label {
    monitor     =
    text        = cmd[update:0] echo "$USER  ·  $(hostname)"
    color       = rgba(122, 122, 122, 0.65)    # --text-4 ·65%
    font_size   = 12
    font_family = MesloLGL Nerd Font Mono
    halign      = left
    valign      = top
    position    = 28, -22
    zindex      = 1
}

# ─── Clock ─────────────────────────────────────────────────────────────────

label {
    monitor     =
    text        = $TIME
    color       = rgba(238, 238, 238, 0.95)    # --text-1 · 95%
    font_size   = 88
    font_family = MesloLGL Nerd Font Mono
    halign      = center
    valign      = center
    position    = 0, 128
    zindex      = 1

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(25, 29, 52, 0.50)
    shadow_boost  = 1.0
}

# ─── Date ──────────────────────────────────────────────────────────────────

label {
    monitor     =
    text        = cmd[update:60000] date "+%A, %d %B"
    color       = rgba(199, 199, 199, 0.55)    # --text-3 · 55%
    font_size   = 15
    font_family = MesloLGL Nerd Font Mono
    halign      = center
    valign      = center
    position    = 0, 54
    zindex      = 1
}

# ─── Accent rule ───────────────────────────────────────────────────────────

shape {
    monitor  =
    size     = 280, 1
    color    = rgba(189, 172, 255, 0.30)       # --accent-2 · 30%
    rounding = 0
    halign   = center
    valign   = center
    position = 0, 18
    zindex   = 1
}

# ─── Input field ───────────────────────────────────────────────────────────

input-field {
    monitor  =
    size     = 280, 44

    rounding          = 0
    outline_thickness = 1

    outer_color = rgba(189, 172, 255, 0.55)    # --accent-2 · 55%
    inner_color = rgba(49, 45, 82, 0.90)       # --bg-2 · 90%
    font_color  = rgba(238, 238, 238, 1)       # --text-1
    font_family = MesloLGL Nerd Font Mono

    dots_size        = 0.28
    dots_spacing     = 0.20
    dots_center      = true
    dots_rounding    = 0

    placeholder_text = <span foreground="##7A7A7A">password</span>
    fade_on_empty    = true
    fade_timeout     = 3500

    check_color    = rgba(169, 220, 118, 0.85) # --green-1
    fail_color     = rgba(255,  97, 136, 0.85) # --red-1
    capslock_color = rgba(255, 216, 102, 0.85) # --yellow-1

    fail_text = <span foreground="##FF6188">$FAIL</span>

    swap_font_color = false

    halign   = center
    valign   = center
    position = 0, -16
    zindex   = 2

    shadow_passes = 1
    shadow_size   = 12
    shadow_color  = rgba(25, 29, 52, 0.55)
    shadow_boost  = 1.0
}

# ─── PAM hint ──────────────────────────────────────────────────────────────

label {
    monitor     =
    text        = $PAMPROMPT
    color       = rgba(122, 122, 122, 0.45)    # --text-4 · 45%
    font_size   = 11
    font_family = MesloLGL Nerd Font Mono
    halign      = center
    valign      = center
    position    = 0, -68
    zindex      = 1
}

# ─── Bottom-right: keyboard layout ────────────────────────────────────────

label {
    monitor     =
    text        = $LAYOUT
    color       = rgba(122, 122, 122, 0.40)    # --text-4 · 40%
    font_size   = 11
    font_family = MesloLGL Nerd Font Mono
    halign      = right
    valign      = bottom
    position    = -28, 22
    zindex      = 1
}